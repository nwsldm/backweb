title: Deploy Your Web Apps at [Light Speed]{class="text-primary"}
description: Build, deploy, and scale your web applications with our modern platform. Git-powered deployments, global CDN, and automatic scaling.
seo:
  title: DeployHub - Modern Web Deployment Platform
  description: Deploy any web app in seconds. Git-powered deployments, global CDN, automatic SSL, and infinite scaling. Focus on code, we handle the infrastructure.
navigation: false
hero:
  links:
    - label: Start Deploying Free
      icon: i-lucide-rocket
      trailing: true
      to: /signup
      size: xl
    - label: View Documentation
      icon: i-lucide-book
      size: xl
      color: neutral
      variant: subtle
      to: /docs
sections:
  - title: Deploy in Seconds
    description: Connect your Git repository and every push automatically deploys. No servers to manage, no complex configurations. Just push code and we handle the rest.
    id: features
    orientation: horizontal
    features:
      - name: Git-Powered Deployments
        description: Push to Git and your app deploys automatically. Preview deployments for every pull request.
        icon: i-lucide-git-branch
      - name: Global CDN
        description: Your apps deploy to 100+ edge locations worldwide. Lightning-fast load times for all users.
        icon: i-lucide-globe
      - name: Zero Configuration
        description: Auto-detects your framework. Works with React, Vue, Svelte, Next.js, Nuxt, and more.
        icon: i-lucide-settings
  - title: Built for Production
    description: Enterprise-grade infrastructure with automatic SSL, DDoS protection, and 99.99% uptime SLA. Scale from side project to millions of users.
    orientation: horizontal
    reverse: true
    features:
      - name: Automatic SSL
        description: Free SSL certificates for all domains. Provisioned and renewed automatically.
        icon: i-lucide-lock
      - name: Instant Rollbacks
        description: Deploy issues? Rollback to any previous version with one click.
        icon: i-lucide-rotate-ccw
      - name: Real-time Analytics
        description: Monitor performance, bandwidth, and visitor metrics in real-time.
        icon: i-lucide-bar-chart
features:
  title: Everything You Need to Ship
  description: From development to production, we provide the tools and infrastructure to deploy and scale your web applications.
  items:
    - title: Preview Deployments
      description: Every pull request gets a live preview URL. Share, test, and review before merging.
      icon: i-lucide-eye
    - title: Custom Domains
      description: Connect unlimited custom domains with automatic SSL. Free subdomains for all projects.
      icon: i-lucide-link
    - title: Environment Variables
      description: Securely manage environment variables per environment. Encrypted at rest and in transit.
      icon: i-lucide-key
    - title: Serverless Functions
      description: Deploy serverless API functions alongside your frontend. Auto-scales to handle any load.
      icon: i-lucide-server
    - title: Edge Config
      description: Store and access configuration data at the edge with millisecond latency globally.
      icon: i-lucide-database
    - title: Team Collaboration
      description: Invite team members, manage permissions, and deploy together with role-based access.
      icon: i-lucide-users
