cta:
  title: Ready to Deploy Your Next Big Idea?
  description: Join thousands of developers deploying with DeployHub. Start for free, scale as you grow.
  links:
    - label: Start Deploying Free
      to: '/signup'
      trailingIcon: i-lucide-arrow-right
