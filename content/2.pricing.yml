faq:
  title: Frequently asked questions
  description: Everything you need to know about DeployHub pricing and features.
  items:
    - label: What's included in the free tier?
      content: The Hobby plan includes unlimited projects, 100GB bandwidth per month, automatic SSL, preview deployments, and community support. Perfect for personal projects and learning.
    - label: How is bandwidth calculated?
      content: Bandwidth is calculated as the total data transferred from your deployed applications to end users. This includes HTML, CSS, JavaScript, images, and other assets.
    - label: Can I upgrade or downgrade anytime?
      content: Yes, you can change your plan at any time. Upgrades take effect immediately, and downgrades are prorated for the current billing period.
    - label: Do you offer discounts for open source?
      content: Yes! We offer free Pro plans for active open source projects. Apply through our open source program.
    - label: What happens if I exceed my bandwidth?
      content: We'll notify you when you're approaching your limit. You can purchase additional bandwidth or upgrade your plan. Overage rates are $0.10/GB.
    - label: How do serverless function invocations work?
      content: Each execution of your serverless function counts as one invocation. The counter resets daily. Unused invocations don't roll over to the next day.
